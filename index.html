<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --bg:#16181c; --panel:#1d2024; --panel-line:#2c3036;
    --ink:#e8e6e0; --ink-dim:#8b8f96;
    --amber:#e8a23a; --slate:#6f97a8; --green:#7a9b6e; --red:#c1604f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ background:var(--bg); color:var(--ink); font-family:'Space Grotesk',sans-serif; min-height:100vh; }
  body{ padding:20px 14px 50px; }
  .wrap{ max-width:880px; margin:0 auto; }

  header{ display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--panel-line); padding-bottom:16px; margin-bottom:22px; flex-wrap:wrap; gap:10px; }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em; color:var(--amber); text-transform:uppercase; margin-bottom:6px; }
  h1{ font-size:24px; font-weight:700; }
  .range{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-dim); text-align:right; line-height:1.6; }

  .controls{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
  .btn{ font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.04em; background:var(--panel); color:var(--ink); border:1px solid var(--panel-line); padding:6px 10px; cursor:pointer; user-select:none; }
  .btn:hover{ border-color:var(--amber); color:var(--amber); }
  .hint{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-dim); margin-left:auto; }

  .vitals{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--panel-line); border:1px solid var(--panel-line); margin-bottom:22px; }
  .vital{ background:var(--panel); padding:14px; }
  .vital .label{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-dim); margin-bottom:8px; }
  .vital .num{ font-size:24px; font-weight:700; font-family:'JetBrains Mono',monospace; }
  .vital .num .unit{ font-size:12px; color:var(--ink-dim); margin-left:3px; }

  .panel{ background:var(--panel); border:1px solid var(--panel-line); margin-bottom:18px; }
  .panel-head{ display:flex; justify-content:space-between; align-items:baseline; padding:14px 16px 4px; }
  .panel-head h2{ font-size:14px; font-weight:600; }
  .meta{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-dim); }
  svg{ display:block; width:100%; height:auto; touch-action:none; user-select:none; }

  .legend{ display:flex; gap:14px; padding:8px 16px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-dim); }
  .dot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:-1px; }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }

  .status{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--ink-dim); text-align:center; margin-top:26px; line-height:1.7; }
  .status.error{ color:var(--red); }
  .status .stamp{ color:var(--amber); }

  @media (max-width:640px){ .vitals{ grid-template-columns:repeat(2,1fr); } .grid2{ grid-template-columns:1fr; } h1{ font-size:21px; } }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="eyebrow" id="eyebrow">Loading…</div>
      <h1>Health Panel</h1>
    </div>
    <div class="range" id="rangeLabel"></div>
  </header>

  <div class="controls">
    <button class="btn" id="panLeft">◀ pan</button>
    <button class="btn" id="panRight">pan ▶</button>
    <button class="btn" id="zoomIn">zoom in</button>
    <button class="btn" id="zoomOut">zoom out</button>
    <button class="btn" id="resetBtn">reset</button>
    <button class="btn" id="refreshBtn">↻ refresh data</button>
    <span class="hint">drag to pan · pinch / scroll to zoom</span>
  </div>

  <div class="vitals" id="vitals"></div>

  <div class="panel">
    <div class="panel-head"><h2>Daily Steps — drag / pinch this one</h2><span class="meta" id="windowMeta"></span></div>
    <svg id="stepsChart" viewBox="0 0 840 200"></svg>
    <div class="legend">
      <span><span class="dot" style="background:var(--amber)"></span>weekday</span>
      <span><span class="dot" style="background:var(--slate)"></span>weekend</span>
    </div>
  </div>

  <div class="grid2">
    <div class="panel">
      <div class="panel-head"><h2>Weight</h2></div>
      <svg id="weightChart" viewBox="0 0 400 170"></svg>
    </div>
    <div class="panel">
      <div class="panel-head"><h2>Resting HR</h2></div>
      <svg id="rhrChart" viewBox="0 0 400 170"></svg>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><h2>Sleep</h2></div>
    <svg id="sleepChart" viewBox="0 0 840 150"></svg>
  </div>

  <div class="status" id="statusLine">connecting to data source…</div>
</div>

<script>
// ===================== CONFIG =====================
const API_URL = "https://script.google.com/macros/s/AKfycbzhiv7g9fW8Elf6R7X779X-piYOEVofgMp97VAvbuqtT7livTpz0UG4hoSgSSvi1-Q/exec";
// ====================================================

const COLORS = { amber:"#e8a23a", slate:"#6f97a8", green:"#7a9b6e", red:"#c1604f", ink:"#e8e6e0", inkDim:"#8b8f96", panelLine:"#2c3036" };

let DATA = null;
let range = [0, 0];

function isWeekend(dateStr){ const wd = new Date(dateStr+"T00:00:00").getDay(); return wd===0||wd===6; }
function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function monthLabel(dateStr){ return new Date(dateStr+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }

function clampRange(lo, hi, total){
  lo = Math.max(0, Math.round(lo));
  hi = Math.min(total-1, Math.round(hi));
  if(hi-lo < 4){ if(lo===0) hi = Math.min(total-1, lo+4); else lo = Math.max(0, hi-4); }
  return [lo, hi];
}

async function loadData(){
  document.getElementById("statusLine").textContent = "connecting to data source…";
  document.getElementById("statusLine").classList.remove("error");
  try {
    const res = await fetch(API_URL, { cache: "no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    if(json.error) throw new Error(json.error);
    if(!json.dates || json.dates.length === 0) throw new Error("Sheet returned no rows");
    DATA = json;
    range = [0, DATA.dates.length - 1];
    document.getElementById("eyebrow").textContent = "Live Data";
    document.getElementById("statusLine").innerHTML = '<span class="stamp">LIVE</span> · last updated ' + new Date(json.updatedAt).toLocaleString();
    render();
  } catch (err) {
    document.getElementById("eyebrow").textContent = "Connection Error";
    document.getElementById("statusLine").textContent = "Couldn't load data: " + err.message + " — check the Apps Script deployment URL and that it's deployed with 'Anyone' access.";
    document.getElementById("statusLine").classList.add("error");
  }
}

function render(){
  if(!DATA) return;
  const [lo, hi] = range;
  const n = DATA.dates.length;

  document.getElementById("rangeLabel").innerHTML = monthLabel(DATA.dates[lo]) + " — " + monthLabel(DATA.dates[hi]) + "<br>" + (hi-lo+1) + " of " + n + " days";
  document.getElementById("windowMeta").textContent = (lo+1) + "–" + (hi+1) + " of " + n;

  const wStart = DATA.weight[lo], wEnd = DATA.weight[hi];
  const vitals = [
    { label:"Avg Steps (window)", val: Math.round(avg(DATA.steps.slice(lo,hi+1))).toLocaleString(), unit:"" },
    { label:"Avg Sleep (window)", val: avg(DATA.sleep.slice(lo,hi+1)).toFixed(1), unit:"hrs" },
    { label:"Avg RHR (window)", val: avg(DATA.rhr.slice(lo,hi+1)).toFixed(0), unit:"bpm" },
    { label:"Weight Δ (window)", val: (wEnd-wStart>=0?"+":"") + (wEnd-wStart).toFixed(1), unit:"kg" },
  ];
  document.getElementById("vitals").innerHTML = vitals.map(v =>
    '<div class="vital"><div class="label">'+v.label+'</div><div class="num">'+v.val+'<span class="unit">'+v.unit+'</span></div></div>'
  ).join("");

  renderStepsChart();
  renderLineChart("weightChart", DATA.weight, COLORS.amber, 1, "kg");
  renderLineChart("rhrChart", DATA.rhr, COLORS.slate, 0, "bpm");
  renderLineChart("sleepChart", DATA.sleep, COLORS.green, 1, "h", 840, 150);
}

function renderStepsChart(){
  const svg = document.getElementById("stepsChart");
  const width = 840, height = 200, padL=40, padB=24, padT=16, padR=12;
  const plotW = width-padL-padR, plotH = height-padT-padB;
  const [lo, hi] = range;
  const visible = DATA.steps.slice(lo, hi+1);
  const dates = DATA.dates.slice(lo, hi+1);
  const n = visible.length;
  const maxV = Math.max(...visible) * 1.1 || 1;

  let els = "";
  const gridVals = [0, Math.round(maxV/2/1000)*1000, Math.round(maxV/1000)*1000];
  gridVals.forEach(v => {
    const y = padT + plotH - (v/maxV)*plotH;
    els += '<line x1="'+padL+'" y1="'+y+'" x2="'+(width-padR)+'" y2="'+y+'" stroke="'+COLORS.panelLine+'" stroke-width="1"/>';
    els += '<text x="4" y="'+(y+3)+'" font-family="JetBrains Mono" font-size="9" fill="'+COLORS.inkDim+'">'+(v>=1000?(v/1000)+"k":v)+'</text>';
  });

  for(let i=0;i<n;i++){
    const x = padL + (i/Math.max(1,n-1))*plotW;
    const barW = Math.max(1, plotW/n - (n>60?0.5:2));
    const bh = (visible[i]/maxV)*plotH;
    const y = padT + plotH - bh;
    const color = isWeekend(dates[i]) ? COLORS.slate : COLORS.amber;
    els += '<rect x="'+(x-barW/2)+'" y="'+y+'" width="'+barW+'" height="'+bh+'" fill="'+color+'" opacity="0.92"/>';
  }

  const tickCount = Math.min(6, n);
  for(let t=0;t<tickCount;t++){
    const i = Math.round((t/Math.max(1,tickCount-1))*(n-1));
    const x = padL + (i/Math.max(1,n-1))*plotW;
    els += '<text x="'+x+'" y="'+(height-6)+'" font-family="JetBrains Mono" font-size="9" fill="'+COLORS.inkDim+'" text-anchor="middle">'+monthLabel(dates[i])+'</text>';
  }

  svg.innerHTML = els;
  attachInteraction(svg, width, plotW, padL);
}

function renderLineChart(id, fullValues, color, decimals, unit, width, height){
  width = width || 400; height = height || 170;
  const svg = document.getElementById(id);
  const padL=40, padB=20, padT=14, padR=12;
  const plotW = width-padL-padR, plotH = height-padT-padB;
  const [lo, hi] = range;
  const visible = fullValues.slice(lo, hi+1);
  const n = visible.length;
  if(n < 2){ svg.innerHTML = ""; return; }

  const minV = Math.min(...visible), maxV = Math.max(...visible);
  const pad = (maxV-minV)*0.2 || 0.5;
  const rlo = minV-pad, rhi = maxV+pad;

  const pts = visible.map((v,i) => {
    const x = padL + (i/(n-1))*plotW;
    const y = padT + plotH - ((v-rlo)/(rhi-rlo))*plotH;
    return [x,y];
  });

  const linePath = "M " + pts.map(p => p[0].toFixed(1)+","+p[1].toFixed(1)).join(" L ");
  const areaPath = linePath + " L " + pts[n-1][0].toFixed(1) + "," + (padT+plotH) + " L " + pts[0][0].toFixed(1) + "," + (padT+plotH) + " Z";

  let els = "";
  [rlo, (rlo+rhi)/2, rhi].forEach(v => {
    const y = padT + plotH - ((v-rlo)/(rhi-rlo))*plotH;
    els += '<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(width-padR)+'" y2="'+y.toFixed(1)+'" stroke="'+COLORS.panelLine+'" stroke-width="1"/>';
    els += '<text x="2" y="'+(y+3).toFixed(1)+'" font-family="JetBrains Mono" font-size="9" fill="'+COLORS.inkDim+'">'+v.toFixed(decimals)+'</text>';
  });
  els += '<path d="'+areaPath+'" fill="'+color+'" opacity="0.12"/>';
  els += '<path d="'+linePath+'" fill="none" stroke="'+color+'" stroke-width="2"/>';
  els += '<circle cx="'+pts[n-1][0].toFixed(1)+'" cy="'+pts[n-1][1].toFixed(1)+'" r="3.5" fill="'+color+'"/>';

  const delta = visible[n-1] - visible[0];
  const dColor = delta===0 ? COLORS.inkDim : (delta<0 ? COLORS.green : COLORS.red);
  els += '<text x="'+(width-padR)+'" y="'+(padT-2)+'" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="'+dColor+'">'+(delta>=0?"+":"")+delta.toFixed(decimals)+unit+' in window</text>';

  svg.innerHTML = els;
}

// ---------- interaction: drag to pan, pinch/wheel to zoom (bound to steps chart) ----------
function attachInteraction(svg, width, plotW, padL){
  const pointers = new Map();
  let dragStart = null;

  function toLocalX(clientX){
    const rect = svg.getBoundingClientRect();
    return ((clientX - rect.left) / rect.width) * width;
  }
  function idxForX(x, lo, hi){
    const n = hi - lo + 1;
    return lo + ((x - padL) / plotW) * (n - 1);
  }

  svg.onpointerdown = (e) => {
    svg.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: toLocalX(e.clientX) });
    if(pointers.size === 1) dragStart = { x: toLocalX(e.clientX), range: [...range] };
  };

  svg.onpointermove = (e) => {
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: toLocalX(e.clientX) });

    if(pointers.size === 2){
      const pts = [...pointers.values()];
      const dist = Math.abs(pts[0].x - pts[1].x);
      if(!dragStart || !dragStart.pinchDist){
        dragStart = { ...dragStart, pinchDist: dist, pinchRange: [...range] };
        return;
      }
      const factor = dragStart.pinchDist / Math.max(1, dist);
      const centerX = (pts[0].x + pts[1].x) / 2;
      const [olo, ohi] = dragStart.pinchRange;
      const centerIdx = idxForX(centerX, olo, ohi);
      const span = ohi - olo;
      const newSpan = Math.max(4, Math.min(DATA.dates.length-1, span*factor));
      let newLo = centerIdx - (centerIdx-olo)*(newSpan/span);
      let newHi = centerIdx + (ohi-centerIdx)*(newSpan/span);
      range = clampRange(newLo, newHi, DATA.dates.length);
      render();
    } else if(pointers.size === 1 && dragStart){
      const dx = toLocalX(e.clientX) - dragStart.x;
      const [olo, ohi] = dragStart.range;
      const span = ohi - olo;
      const deltaIdx = -(dx/plotW)*span;
      let newLo = olo+deltaIdx, newHi = ohi+deltaIdx;
      const total = DATA.dates.length;
      if(newLo < 0){ newHi -= newLo; newLo = 0; }
      if(newHi > total-1){ newLo -= (newHi-(total-1)); newHi = total-1; }
      range = clampRange(newLo, newHi, total);
      render();
    }
  };

  svg.onpointerup = svg.onpointercancel = (e) => {
    pointers.delete(e.pointerId);
    if(pointers.size < 2){
      dragStart = pointers.size === 1 ? { x: [...pointers.values()][0].x, range: [...range] } : null;
    }
  };

  svg.onwheel = (e) => {
    e.preventDefault();
    const x = toLocalX(e.clientX);
    const [lo, hi] = range;
    const centerIdx = idxForX(x, lo, hi);
    const factor = e.deltaY > 0 ? 1.15 : 0.87;
    const span = hi - lo;
    const newSpan = Math.max(4, Math.min(DATA.dates.length-1, span*factor));
    let newLo = centerIdx - (centerIdx-lo)*(newSpan/span);
    let newHi = centerIdx + (hi-centerIdx)*(newSpan/span);
    range = clampRange(newLo, newHi, DATA.dates.length);
    render();
  };

  svg.style.cursor = "grab";
}

// ---------- button controls ----------
document.getElementById("panLeft").onclick = () => {
  const span = range[1]-range[0];
  const delta = -Math.max(2, Math.round(span*0.25));
  let [lo,hi] = range; lo+=delta; hi+=delta;
  const total = DATA.dates.length;
  if(lo<0){ hi-=lo; lo=0; }
  range = clampRange(lo,hi,total); render();
};
document.getElementById("panRight").onclick = () => {
  const span = range[1]-range[0];
  const delta = Math.max(2, Math.round(span*0.25));
  let [lo,hi] = range; lo+=delta; hi+=delta;
  const total = DATA.dates.length;
  if(hi>total-1){ lo-=(hi-(total-1)); hi=total-1; }
  range = clampRange(lo,hi,total); render();
};
document.getElementById("zoomIn").onclick = () => {
  const [lo,hi] = range; const center=(lo+hi)/2; const span=hi-lo;
  const newSpan = Math.max(4, span*0.7);
  range = clampRange(center-(center-lo)*(newSpan/span), center+(hi-center)*(newSpan/span), DATA.dates.length);
  render();
};
document.getElementById("zoomOut").onclick = () => {
  const [lo,hi] = range; const center=(lo+hi)/2; const span=hi-lo;
  const newSpan = Math.max(4, Math.min(DATA.dates.length-1, span*1.4));
  range = clampRange(center-(center-lo)*(newSpan/span), center+(hi-center)*(newSpan/span), DATA.dates.length);
  render();
};
document.getElementById("resetBtn").onclick = () => { range = [0, DATA.dates.length-1]; render(); };
document.getElementById("refreshBtn").onclick = loadData;

loadData();
</script>
</body>
</html>
